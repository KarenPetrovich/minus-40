<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Минус 40 Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Manrope, system-ui, sans-serif;
        --bg: #f4f5f8;
        --ink: #1a1c1e;
        --muted: #737685;
        --line: rgba(0, 50, 138, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(circle at 1px 1px, rgba(0, 50, 138, 0.07) 1px, transparent 0) 0 0 / 16px 16px,
          linear-gradient(180deg, #f8f9fc 0%, #eef1f8 100%);
        color: var(--ink);
      }

      .shell {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: 72px 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 24px 14px;
        background: linear-gradient(180deg, rgba(248, 249, 252, 0.94), rgba(248, 249, 252, 0.7));
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        font-size: 38px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .beta {
        display: inline-flex;
        align-items: center;
        height: 30px;
        padding: 0 12px;
        border: 1px solid #2f3136;
        border-radius: 999px;
        color: #2f3136;
        font-size: 12px;
        font-weight: 700;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .action {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 14px;
        background: transparent;
        color: #1f2430;
      }

      .action svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .action.primary {
        width: 126px;
        border: 1px solid rgba(0, 50, 138, 0.18);
        background: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        font-weight: 700;
        color: #1d2333;
        gap: 8px;
      }

      .canvas {
        position: relative;
        overflow: auto;
        padding: 28px 24px 32px;
      }

      .device-stage {
        width: min(100%, 1400px);
        margin: 0 auto;
        min-height: calc(100% - 16px);
        display: grid;
        place-items: start center;
      }

      .device-wrap {
        display: grid;
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 14px;
      }

      .device {
        width: 390px;
        height: 884px;
        border-radius: 40px;
        overflow: hidden;
        background: #f9f9fc;
        box-shadow:
          0 24px 80px rgba(0, 32, 96, 0.18),
          0 0 0 1px rgba(0, 50, 138, 0.12);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #f9f9fc;
      }

      .caption {
        color: var(--muted);
        font-size: 14px;
        text-align: center;
      }

      .caption code {
        background: rgba(0, 50, 138, 0.08);
        padding: 2px 6px;
        border-radius: 999px;
      }

      @media (max-width: 880px) {
        .shell {
          grid-template-rows: auto 1fr;
        }

        .topbar {
          padding: 14px 16px 12px;
        }

        .brand-mark {
          font-size: 28px;
        }

        .beta {
          height: 28px;
        }

        .canvas {
          padding: 0;
        }

        .device-stage {
          width: 100%;
          min-height: 100%;
        }

        .device-wrap {
          width: 100%;
          height: 100%;
        }

        .device {
          width: 100vw;
          height: calc(100vh - 60px);
          border-radius: 0;
          box-shadow: none;
        }

        .caption {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">Stitch</div>
          <div class="beta">BETA</div>
        </div>
        <div class="actions" aria-hidden="true">
          <button class="action" type="button" title="Mobile">
            <svg viewBox="0 0 24 24">
              <rect x="7" y="3" width="10" height="18" rx="2.5"></rect>
              <path d="M9 6h6"></path>
              <path d="M9 18h6"></path>
            </svg>
          </button>
          <button class="action" type="button" title="Desktop">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="5" width="16" height="11" rx="1.5"></rect>
              <path d="M8 20h8"></path>
              <path d="M12 16v4"></path>
            </svg>
          </button>
          <button class="action" type="button" title="Refresh">
            <svg viewBox="0 0 24 24">
              <path d="M20 12a8 8 0 1 1-2.2-5.5"></path>
              <path d="M20 4v5h-5"></path>
            </svg>
          </button>
          <button class="action primary" type="button">
            <svg viewBox="0 0 24 24">
              <circle cx="6" cy="6" r="2"></circle>
              <circle cx="18" cy="6" r="2"></circle>
              <circle cx="6" cy="18" r="2"></circle>
              <circle cx="18" cy="18" r="2"></circle>
            </svg>
            Поделиться
          </button>
        </div>
      </header>
      <main class="canvas">
        <div class="device-stage">
          <div class="device-wrap">
            <div class="device">
              <iframe src="/" title="Minus 40 app preview"></iframe>
            </div>
            <div class="caption">Предпросмотр телефона 390×884. Открой <code>http://127.0.0.1:4173/code.html</code>.</div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
